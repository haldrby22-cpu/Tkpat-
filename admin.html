<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h2>إضافة مطعم</h2>
        <input type="text" id="name" placeholder="اسم المطعم">
        <input type="text" id="address" placeholder="العنوان">
        <button onclick="addRestaurant()">إضافة للموقع</button>
        <p id="msg"></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApjsbc63GjzB7FYEZPBcJLKYc_delSe2Q",
            authDomain: "tlpat-65977.firebaseapp.com",
            projectId: "tlpat-65977",
            storageBucket: "tlpat-65977.firebasestorage.app",
            messagingSenderId: "831053645639",
            appId: "1:831053645639:web:ce0595983df188e9e62e62"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function addRestaurant() {
            const name = document.getElementById("name").value;
            const address = document.getElementById("address").value;
            const msg = document.getElementById("msg");

            if(name === "" || address === "") {
                alert("يرجى كتابة الاسم والعنوان");
                return;
            }

            msg.innerText = "جاري الإضافة...";

            db.collection("restaurants").add({
                name: name,
                address: address
            })
            .then(function() {
                msg.innerText = "تمت الإضافة بنجاح! ✅";
                document.getElementById("name").value = "";
                document.getElementById("address").value = "";
            })
            .catch(function(error) {
                msg.innerText = "خطأ: " + error.message;
            });
        }
    </script>
</body>
</html>
