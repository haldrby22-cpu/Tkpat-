<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الأدمن</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #22c55e; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>إضافة مطعم جديد</h2>
        <input type="text" id="restName" placeholder="اسم المطعم">
        <input type="text" id="restAddress" placeholder="العنوان">
        <button onclick="addRestaurant()">إضافة للموقع</button>
    </div>

    <script>
        // بيانات مشروعك (تم تعبئتها بنجاح)
        const firebaseConfig = {
            apiKey: "AIzaSyApjsbc63GjzB7FYEZPBcJLKYc_delSe2Q",
            authDomain: "tlpat-65977.firebaseapp.com",
            projectId: "tlpat-65977",
            storageBucket: "tlpat-65977.firebasestorage.app",
            messagingSenderId: "831053645639",
            appId: "1:831053645639:web:ce0595983df188e9e62e62"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function addRestaurant() {
            const name = document.getElementById("restName").value;
            const address = document.getElementById("restAddress").value;
            
            if (!name || !address) {
                alert("يرجى ملء جميع الحقول!");
                return;
            }

            db.collection("restaurants").add({
                name: name,
                address: address
            }).then(() => {
                alert("تمت إضافة المطعم بنجاح!");
                document.getElementById("restName").value = "";
                document.getElementById("restAddress").value = "";
            }).catch(error => {
                alert("خطأ: " + error.message);
            });
        }
    </script>
</body>
</html>
