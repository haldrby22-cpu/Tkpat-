<script>
    // ... (نفس الإعدادات السابقة)
    
    function addRestaurant() {
        const name = document.getElementById("restName").value;
        const address = document.getElementById("restAddress").value;
        const status = document.getElementById("status");

        if (!name || !address) {
            alert("يرجى ملء الحقول!");
            return;
        }

        status.innerHTML = "جاري الإرسال...";

        db.collection("restaurants").add({
            name: name,
            address: address
        })
        .then(function() {
            status.innerHTML = "✅ تمت الإضافة بنجاح!";
            alert("تم الإضافة!");
            // مسح الحقول
            document.getElementById("restName").value = "";
            document.getElementById("restAddress").value = "";
        })
        .catch(function(error) {
            status.innerHTML = "خطأ: " + error.code;
            alert("خطأ: " + error.message);
        });
    }
</script>
