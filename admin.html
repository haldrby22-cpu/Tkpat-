<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فحص الاتصال</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <h2>فحص الاتصال بـ Firebase</h2>
    <button onclick="checkConnection()">اضغط للفحص</button>
    <p id="result"></p>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApjsbc63GjzB7FYEZPBcJLKYc_delSe2Q",
            authDomain: "tlpat-65977.firebaseapp.com",
            projectId: "tlpat-65977",
            storageBucket: "tlpat-65977.firebasestorage.app",
            messagingSenderId: "831053645639",
            appId: "1:831053645639:web:ce0595983df188e9e62e62"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function checkConnection() {
            document.getElementById("result").innerText = "جاري الاتصال...";
            db.collection("restaurants").limit(1).get()
            .then(() => {
                document.getElementById("result").innerText = "✅ الاتصال سليم! يمكنك الإضافة.";
            })
            .catch(error => {
                document.getElementById("result").innerText = "❌ فشل الاتصال: " + error.message;
            });
        }
    </script>
</body>
</html>
