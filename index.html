<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طلبات فرشوط</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #1e293b; padding: 20px; margin: 15px auto; border-radius: 15px; width: 80%; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🍽️ مطاعم فرشوط</h1>
    <div id="app">
        <div class="card" onclick="alert('بيتزا - 50 ج.م')">
            <h3>مطعم البيت السعيد</h3>
            <p>فرشوط - شارع المركز</p>
        </div>
        <div class="card" onclick="alert('كشري - 20 ج.م')">
            <h3>مطعم التوحيد</h3>
            <p>فرشوط - بجوار المحطة</p>
        </div>
    </div>
</body>
</html>
